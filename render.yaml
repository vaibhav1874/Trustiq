services:
  # Backend Service
  - type: web
    name: trustiq-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free # or standard
    region: ohio
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trustiq-db
          property: connectionString
      - key: OLLAMA_BASE_URL
        value: "http://localhost:11434" # Default for local, override for production
      - key: PERSIST_DIRECTORY
        value: "/etc/secrets/chroma_db"
    disk:
      name: trustiq-data
      mountPath: /etc/secrets/chroma_db
      sizeGB: 1

  # Frontend Service (Static Site)
  - type: web
    name: trustiq-frontend
    runtime: node
    buildCommand: npm install && npm run build
    publishPath: out
    staticPublishPath: frontend/out # If using static export, otherwise use 'web' with 'npm install && npm run build'
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: trustiq-backend
          property: host

databases:
  - name: trustiq-db
    plan: free
